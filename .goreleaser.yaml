version: 2

project_name: zabadev

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/zabadev
    binary: zabadev
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X github.com/zabadev/agent-ai/cmd/zabadev/main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: ZaBaDeVgit
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: zabadev
    homepage: "https://github.com/zabadev/agent-ai"
    description: "Senior ZaBaDeV AI Agent Ecosystem — One command to configure any AI coding agent."
    license: "MIT"
    commit_msg_template: "chore: update zabadev formula to {{ .Tag }}"

release:
  footer: |
    **Full Changelog**: https://github.com/ZaBaDeVgit/ZaBaDeV_AgentAI/compare/{{ .PreviousTag }}...{{ .Tag }}

snapshot:
  version_template: "{{ incpatch .Version }}-next"
